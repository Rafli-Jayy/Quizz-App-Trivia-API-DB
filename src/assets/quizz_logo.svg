<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradient Background Zinc Mewah -->
    <linearGradient id="zincBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#18181b" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>
    <!-- Gradient Tanda Tanya Putih ke Abu-abu Elegan -->
    <linearGradient id="glyphGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#d4d4d8" />
    </linearGradient>
  </defs>
  
  <!-- Base Card Rounded Luar -->
  <rect width="512" height="512" rx="140" fill="url(#zincBg)" />
  
  <!-- Border Inner Subtle (Efek Simetris Ala Vercel) -->
  <rect x="20" y="20" width="472" height="472" rx="120" fill="none" stroke="#27272a" stroke-width="6" opacity="0.6" />
  
  <!-- Ikon Tanda Tanya Minimalis Geometris -->
  <path d="M205 185 C205 115, 307 115, 307 185 C307 235, 256 255, 256 305" 
        fill="none" 
        stroke="url(#glyphGrad)" 
        stroke-width="46" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
        
  <!-- Titik Bawah Tanda Tanya -->
  <circle cx="256" cy="395" r="28" fill="#ffffff" />
</svg>
